# Configuración de nginx para servir la SPA de NexoPet y proxear los microservicios.
#
# NOTA: los hosts 'gateway' y 'chat-service' son los nombres de servicio previstos
# para el docker-compose del integrante de DevOps. Se ajustan allí si cambian.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API Gateway (HTTP). El path /api llega tal cual: el prefijo global del
    # gateway también es /api, así que no se reescribe.
    location /api {
        proxy_pass http://gateway:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat-service (Socket.IO / WebSocket). Requiere Upgrade/Connection.
    location /socket.io {
        proxy_pass http://chat-service:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Fallback SPA: cualquier ruta desconocida devuelve index.html para que
    # React Router resuelva la navegación del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
