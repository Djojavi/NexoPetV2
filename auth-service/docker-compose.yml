version: '3.8'

services:
  auth-db:
    image: postgres:16-alpine
    container_name: veterinaria-auth-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - veterinaria-network

networks:
  veterinaria-network:
    driver: bridge

volumes:
  postgres_auth_data: