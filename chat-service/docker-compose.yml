services:
  chat-db:
    image: postgres:16-alpine
    container_name: nexopet-chat-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veterinaria-network

  chat-service:
    build: .
    container_name: nexopet-chat-service
    depends_on:
      chat-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@chat-db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: '3004'
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - '3004:3004'
    networks:
      - veterinaria-network

networks:
  veterinaria-network:
    driver: bridge

volumes:
  postgres_chat_data:
